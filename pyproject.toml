[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "burnbox"
version = "1.0.0"
description = "Temporary email that burns after reading"
requires-python = ">=3.10"
dependencies = [
    "httpx",
    "html2text",
    "rich",
    "typer",
    "pyperclip",
    "tomli; python_version < '3.11'",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[project.scripts]
burnbox = "burnbox.cli:app"

[tool.setuptools.packages.find]
include = ["burnbox*"]
